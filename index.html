      background: linear-gradient(135deg, #0F172A 0%, #1E293B 100%);
      color: #E2E8F0;
      min-height: 100vh;

      margin-bottom: 8px;

    }
    .subtitle {
      text-align: center;
      color: #94A3B8;

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));

    .card {
      background: rgba(30, 41, 59, 0.8);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(56, 189, 248, 0.15);
      border-radius: 16px;
      padding: 24px 20px;
      text-align: center;
      transition: all 0.3s ease;
      cursor: pointer;
      text-decoration: none;
      color: inherit;
      display: block;
      position: relative;
      overflow: hidden;
    }
    .card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: linear-gradient(135deg, rgba(56,189,248,0.1), rgba(129,140,248,0.05));
      opacity: 0;
      transition: opacity 0.3s ease;
    }
    .card:hover::before { opacity: 1; }
    .card:hover {
      border-color: rgba(56, 189, 248, 0.4);
      transform: translateY(-2px);
      box-shadow: 0 8px 32px rgba(56, 189, 248, 0.15);
    }
    .card .icon {
      font-size: 2.4rem;
      margin-bottom: 12px;
      position: relative;
      z-index: 1;
    }
    .card .name {
      font-size: 1rem;
      font-weight: 600;
      margin-bottom: 4px;
      position: relative;
      z-index: 1;
    }
    .card .desc {
      font-size: 0.8rem;
      color: #94A3B8;
      position: relative;
      z-index: 1;
    }
    .card .size {
      font-size: 0.75rem;
      color: #64748B;
      margin-top: 8px;
      position: relative;
      z-index: 1;
    }
    .badge {

      color: #38BDF8;

      padding: 2px 8px;

    .info {

      color: #64748B;
      font-size: 0.85rem;
      margin-top: 32px;
      line-height: 1.8;
    }
    .info a { color: #38BDF8; text-decoration: none; }
    .info a:hover { text-decoration: underline; }
    .status {
      text-align: center;
      color: #34D399;
      font-size: 0.85rem;
      margin-bottom: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .status .dot {
      width: 8px; height: 8px;
      background: #34D399;
      border-radius: 50%;
      display: inline-block;
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }
    .updated {
      text-align: center;
      color: #64748B;
      font-size: 0.8rem;

</head>
<body>

  <script>
    // 获取文件大小并显示
    async function getFileSize(url, elementId) {
      try {
        const res = await fetch(url, { method: 'HEAD' })
        const size = res.headers.get('Content-Length')
        if (size) {
          const mb = (parseInt(size) / 1024 / 1024).toFixed(1)
          document.getElementById(elementId).textContent = mb + ' MB'
        }
      } catch {}
    }
    getFileSize('https://github.com/yaoyao5296/chatroom/releases/download/v1.0.0/chatroom-android.zip', 'size-apk')

    getFileSize('https://github.com/yaoyao5296/chatroom/releases/download/v1.0.0/chatroom-linux.zip', 'size-linux')

    document.getElementById('updated-time').textContent = '更新于: ' + new Date().toLocaleString('zh-CN', { timeZone: 'Asia/Shanghai' })
