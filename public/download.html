<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>ChatRoom - 下载中心</title>
  <meta name="description" content="ChatRoom 官方下载 - 随时随地，畅快聊天">
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <style>
    :root {
      --bg: #0a0a0f;
      --card-bg: rgba(15, 23, 42, 0.8);
      --border: rgba(56, 189, 248, 0.15);
      --glow: rgba(56, 189, 248, 0.3);
      --purple: #818CF8;
      --cyan: #38BDF8;
      --green: #34D399;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
      background: var(--bg);
      color: #E2E8F0;
      min-height: 100vh;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* 星空背景 */
    .stars {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      pointer-events: none;
      z-index: 0;
    }
    .star {
      position: absolute;
      background: white;
      border-radius: 50%;
      animation: twinkle var(--dur) ease-in-out infinite;
      animation-delay: var(--delay);
      opacity: 0;
    }
    @keyframes twinkle {
      0%, 100% { opacity: 0.2; }
      50% { opacity: 0.8; }
    }

    /* 网格线背景 */
    .grid-bg {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background-image:
        linear-gradient(rgba(56, 189, 248, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(56, 189, 248, 0.03) 1px, transparent 1px);
      background-size: 60px 60px;
      pointer-events: none;
      z-index: 0;
    }

    /* 主容器 */
    .main {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 40px 20px;
    }

    .container {
      max-width: 900px;
      width: 100%;
    }

    /* Logo 区域 */
    .logo-section {
      text-align: center;
      margin-bottom: 48px;
    }
    .logo-icon {
      width: 80px;
      height: 80px;
      margin: 0 auto 20px;
      background: linear-gradient(135deg, var(--cyan), var(--purple));
      border-radius: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 36px;
      box-shadow: 0 0 40px var(--glow), 0 0 80px rgba(56, 189, 248, 0.1);
      animation: logoPulse 3s ease-in-out infinite;
      position: relative;
    }
    .logo-icon::after {
      content: '';
      position: absolute;
      inset: -3px;
      border-radius: 27px;
      background: linear-gradient(135deg, var(--cyan), var(--purple), var(--cyan));
      z-index: -1;
      animation: logoBorder 3s linear infinite;
      background-size: 200% 200%;
      filter: blur(8px);
      opacity: 0.5;
    }
    @keyframes logoPulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes logoBorder {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    h1 {
      font-size: clamp(2rem, 5vw, 3rem);
      font-weight: 800;
      background: linear-gradient(135deg, var(--cyan) 0%, var(--purple) 50%, var(--cyan) 100%);
      background-size: 200% auto;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: shimmer 3s linear infinite;
      letter-spacing: -0.5px;
    }
    @keyframes shimmer {
      to { background-position: 200% center; }
    }

    .subtitle {
      color: #94A3B8;
      font-size: 1.1rem;
      margin-top: 8px;
      letter-spacing: 2px;
    }

    /* 下载卡片网格 */
    .download-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      margin-bottom: 32px;
    }

    .dl-card {
      position: relative;
      background: var(--card-bg);
      backdrop-filter: blur(20px);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 28px 20px;
      text-align: center;
      cursor: pointer;
      text-decoration: none;
      color: inherit;
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      overflow: hidden;
    }
    .dl-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: radial-gradient(circle at 50% 0%, var(--glow), transparent 70%);
      opacity: 0;
      transition: opacity 0.4s;
    }
    .dl-card:hover {
      transform: translateY(-4px);
      border-color: rgba(56, 189, 248, 0.5);
      box-shadow: 0 0 30px var(--glow), 0 0 60px rgba(56, 189, 248, 0.05);
    }
    .dl-card:hover::before { opacity: 1; }
    .dl-card:active { transform: scale(0.98); }

    .dl-card .icon-wrap {
      position: relative;
      z-index: 1;
      width: 64px;
      height: 64px;
      margin: 0 auto 16px;
      background: rgba(56, 189, 248, 0.1);
      border-radius: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 30px;
      border: 1px solid rgba(56, 189, 248, 0.2);
    }

    .dl-card .name {
      position: relative;
      z-index: 1;
      font-size: 1.1rem;
      font-weight: 700;
      margin-bottom: 6px;
    }
    .dl-card .desc {
      position: relative;
      z-index: 1;
      font-size: 0.82rem;
      color: #94A3B8;
    }
    .dl-card .size {
      position: relative;
      z-index: 1;
      font-size: 0.75rem;
      color: #64748B;
      margin-top: 10px;
    }

    .badge {
      position: relative;
      z-index: 1;
      display: inline-block;
      padding: 3px 12px;
      border-radius: 20px;
      font-size: 0.7rem;
      font-weight: 600;
      margin-top: 10px;
      letter-spacing: 0.5px;
    }
    .badge-rec { background: rgba(56, 189, 248, 0.15); color: var(--cyan); }
    .badge-new { background: rgba(52, 211, 153, 0.15); color: var(--green); }
    .badge-coming { background: rgba(148, 163, 184, 0.1); color: #94A3B8; }

    /* 扫描线效果 */
    .scan-line {
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--cyan), transparent);
      opacity: 0;
      transition: opacity 0.3s;
      z-index: 2;
      animation: scanDown 2s linear infinite;
    }
    .dl-card:hover .scan-line { opacity: 1; }
    @keyframes scanDown {
      0% { top: 0; }
      100% { top: 100%; }
    }

    /* 底部信息 */
    .info-section {
      text-align: center;
      margin-top: 24px;
    }
    .version-info {
      color: #64748B;
      font-size: 0.85rem;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
      flex-wrap: wrap;
    }
    .version-info span {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--green);
      animation: dotPulse 2s ease-in-out infinite;
    }
    @keyframes dotPulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(52, 211, 153, 0.4); }
      50% { box-shadow: 0 0 0 8px rgba(52, 211, 153, 0); }
    }

    .tips {
      color: #475569;
      font-size: 0.8rem;
      line-height: 1.8;
    }
    .tips a {
      color: var(--cyan);
      text-decoration: none;
      transition: color 0.2s;
    }
    .tips a:hover { color: var(--purple); }

    /* 响应式 */
    @media (max-width: 480px) {
      .download-grid {
        grid-template-columns: 1fr;
        gap: 12px;
      }
      .dl-card { padding: 20px 16px; }
      .logo-icon { width: 60px; height: 60px; font-size: 28px; }
    }
  </style>
</head>
<body>
  <!-- 星空背景 -->
  <div class="stars" id="stars"></div>
  <div class="grid-bg"></div>

  <div class="main">
    <div class="container">
      <!-- Logo -->
      <div class="logo-section">
        <div class="logo-icon">💬</div>
        <h1>ChatRoom</h1>
        <p class="subtitle">随时随地 · 畅快聊天</p>
      </div>

      <!-- 下载卡片 -->
      <div class="download-grid">
        <!-- Android APK -->
        <a class="dl-card" href="/ChatRoom.apk" download>
          <div class="scan-line"></div>
          <div class="icon-wrap">📱</div>
          <div class="name">Android</div>
          <div class="desc">手机直接安装</div>
          <div class="size" id="size-apk">计算中...</div>
          <span class="badge badge-rec">推荐</span>
        </a>

        <!-- Web 版 -->
        <a class="dl-card" href="/" target="_blank">
          <div class="scan-line"></div>
          <div class="icon-wrap">🌐</div>
          <div class="name">Web 版</div>
          <div class="desc">浏览器直接使用</div>
          <div class="size">无需下载</div>
          <span class="badge badge-new">在线</span>
        </a>
      </div>

      <!-- 底部信息 -->
      <div class="info-section">
        <div class="version-info">
          <span><span class="dot"></span> 服务运行中</span>
          <span>📦 v1.0.0</span>
          <span id="updated-time">更新于: 加载中...</span>
        </div>
        <p class="tips">
          💡 Android 手机点击下载 APK 直接安装 · 如遇问题请到
          <a href="https://github.com/yaoyao5296/chatroom" target="_blank">GitHub</a> 反馈
        </p>
      </div>
    </div>
  </div>

  <script>
    // 生成星空
    (function() {
      const stars = document.getElementById('stars');
      const count = 80;
      for (let i = 0; i < count; i++) {
        const star = document.createElement('div');
        star.className = 'star';
        star.style.left = Math.random() * 100 + '%';
        star.style.top = Math.random() * 100 + '%';
        const size = Math.random() * 2 + 1;
        star.style.width = size + 'px';
        star.style.height = size + 'px';
        star.style.setProperty('--dur', (Math.random() * 3 + 2) + 's');
        star.style.setProperty('--delay', (Math.random() * 5) + 's');
        stars.appendChild(star);
      }
    })();

    // 获取APK文件大小
    (async function() {
      try {
        const res = await fetch('/ChatRoom.apk', { method: 'HEAD' });
        const size = res.headers.get('Content-Length');
        if (size) {
          const mb = (parseInt(size) / 1024 / 1024).toFixed(1);
          document.getElementById('size-apk').textContent = mb + ' MB';
        }
      } catch {
        document.getElementById('size-apk').textContent = '18.7 MB';
      }
    })();

    // 更新时间
    document.getElementById('updated-time').textContent =
      '更新于: ' + new Date().toLocaleString('zh-CN', { timeZone: 'Asia/Shanghai' });
  </script>
</body>
</html>
