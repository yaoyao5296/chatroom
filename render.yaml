# Render 部署配置
# 部署后 Render 会生成一个 URL，例如 https://chatroom-api.onrender.com
# 把该 URL 填入下方 VITE_API_BASE 中，重新打包 APK 即可
services:
  - type: web
    name: chatroom-api
    env: node
    rootDir: .
    buildCommand: npm install
    startCommand: node --max-old-space-size=384 --optimize-for-size --max-semi-space-size=2 --initial-old-space-size=128 --import tsx api/server.ts
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: 20.0.0
      - key: PORT
        value: "3001"
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: JWT_SECRET
        generateValue: true
    disk:
      name: chatroom-data
      mountPath: /opt/render/project/src
      sizeGB: 1